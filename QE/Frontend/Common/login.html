  <!-- Script Service Worker -->
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Ne pas enregistrer le SW sur localhost (mode dev)
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        console.log('[DEV] Service Worker désactivé sur localhost');
        // Désenregistrer le SW s'il existe déjà
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('[DEV] Service Worker désenregistré');
          }
        });
        return;
      }

      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('SW registered: ', registration);
        })
        .catch((registrationError) => {
          console.log('SW registration failed: ', registrationError);
        });
    });
  }
  </script>

<script>
// Attendre que le DOM soit complètement chargé
document.addEventListener('DOMContentLoaded', () => {
  // Petite pause pour s'assurer que tout est chargé
  setTimeout(() => {
    initializeLoginPage();
  }, 100);
});

function initializeLoginPage() {
  // Vérifier s'il y a des données sauvegardées au chargement de la page
  const savedCredentials = localStorage.getItem('qwotaCredentials');
  if (savedCredentials) {
    try {
      const { username, password, rememberMe } = JSON.parse(savedCredentials);
      if (rememberMe) {
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.getElementById('rememberMe').checked = true;

        // Connexion automatique si "Se souvenir de moi" était coché
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    } catch (error) {
      // Erreur lors du chargement des données sauvegardées
      localStorage.removeItem('qwotaCredentials');
    }
  }

  // Gestion du formulaire de connexion
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const rememberMe = document.getElementById("rememberMe").checked;
  const btnText = document.getElementById("btnText");
  const btnSpinner = document.getElementById("btnSpinner");
  const loginButton = document.getElementById("loginButton");
  const message = document.getElementById("message");

  if (!username || !password) {
    message.textContent = "Veuillez remplir tous les champs.";
    return;
  }

  // Show loading state
  loginButton.classList.add("loading");
  btnText.style.opacity = "0";
  btnSpinner.classList.remove("hidden");
  message.textContent = "";

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("username", username);
      localStorage.setItem("userRole", data.role);

      // Sauvegarder les données si "Se souvenir de moi" est coché
      if (rememberMe) {
        localStorage.setItem('qwotaCredentials', JSON.stringify({
          username,
          password,
          rememberMe: true
        }));
      } else {
        // Supprimer les données sauvegardées si la case n'est pas cochée
        localStorage.removeItem('qwotaCredentials');
      }

      // Vérifier d'abord si l'utilisateur a complété l'onboarding (seulement pour entrepreneurs)
      if (data.role === "entrepreneur") {
        // Vérifier le statut de l'onboarding
        const onboardingCheck = await fetch(`/api/check-onboarding/${username}`);
        const onboardingData = await onboardingCheck.json();

        if (!onboardingData.completed) {
          // Première connexion - rediriger vers onboarding
          window.location.href = "/onboarding";
          return;
        }

        // Onboarding complété - redirection vers apppc (responsive mobile et desktop)
        window.location.href = "/apppc"; // Application SPA responsive pour mobile et PC
      } else if (data.role === "coach") {
        window.location.href = "/parametrecoach";
      } else if (data.role === "direction") {
        window.location.href = "/apppcdirection"; // Rediriger direction vers interface admin
      } else if (data.role === "support") {
        window.location.href = "/support-admin"; // Rediriger support vers admin support
      } else {
        message.textContent = "Rôle inconnu: " + data.role;
      }
    } else {
      message.textContent = data.detail || "Erreur de connexion";
    }
  } catch (error) {
    message.textContent = "Erreur serveur, réessayez plus tard.";
  } finally {
    // Hide loading state
    loginButton.classList.remove("loading");
    btnText.style.opacity = "1";
    btnSpinner.classList.add("hidden");
  }
  });

  // Smooth animations for form inputs
  document.querySelectorAll('.form-input').forEach(input => {
    input.addEventListener('focus', () => {
      input.parentElement.classList.add('focused');
    });

    input.addEventListener('blur', () => {
      input.parentElement.classList.remove('focused');
    });
  });
}
</script>

</body>
</html>
