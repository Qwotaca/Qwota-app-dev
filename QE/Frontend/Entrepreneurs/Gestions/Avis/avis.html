    return date.toLocaleDateString('fr-FR', options);
  }

      if (val <= rating) {
        star.style.color = '#f7b500'; // jaune
      } else {
        star.style.color = '#ccc'; // gris
      }
      star.setAttribute('aria-checked', val === rating);
      star.tabIndex = val === rating ? 0 : -1;
    });
  }

        </div>
      `;

      reviewsContainer.innerHTML = `
        <div class="text-center py-8" style="color: var(--text-gray);">
          <i class="fas fa-star text-2xl mb-2" style="color: rgba(247, 181, 0, 0.3);"></i>
          <p class="text-sm">Aucun avis pour le moment</p>
        </div>
      `;
      return;
    }
    allReviews.forEach(renderReview);
    console.log('Afficher tous les avis (' + allReviews.length + ' avis)');
  }

  // Crée un élément avis
  function renderReview(r) {
    const reviewElem = document.createElement('div');
    reviewElem.className = 'review-card';

    reviewElem.innerHTML = `
      <div class="review-header">
        <div class="review-name">${r.prenom} ${r.nom}</div>
        <div class="review-date">${formatDate(r.timestamp)}</div>
      </div>
      <div class="review-stars">${renderStars(r.rating)}</div>
      <div class="review-comment">${r.comment || ''}</div>
    `;

    reviewsContainer.appendChild(reviewElem);
  }

  // Rends les étoiles affichées dans chaque avis
  function renderStars(rating) {
    let starsHtml = '';
    for (let i = 1; i <= 5; i++) {
      starsHtml += i <= rating ? '&#9733;' : '&#9734;';
    }
    return starsHtml;
  }

  // Clic sur une étoile : mise à jour de la sélection et affichage filtré
  stars.forEach(star => {
    star.addEventListener('click', () => {
      const rating = Number(star.dataset.value);
      selectedRating = rating; // Modifie la sélection (pas de désélection possible)
      highlightStars(selectedRating);
      renderFilteredReviews(selectedRating);
      console.log("Filtrer les avis avec " + selectedRating + " étoiles");
    });
  });

  // Initialisation : récupération des avis + affichage par défaut 5 étoiles
  async function initReviews() {
    try {
      if (!window.username) {
        // Réessayer dans 100ms si common.js n'est pas encore prêt
        setTimeout(initReviews, 100);
        return;
      }
      const res = await fetch(`/api/reviews/${window.username}`);
      if (!res.ok) throw new Error('Erreur chargement avis');
      const data = await res.json();
      allReviews = data.reviews;

      showAllReviews();  // Affiche tous les avis par défaut
      console.log("Affichage de tous les avis par défaut"); // Log par défaut au chargement
    } catch (err) {
      // En cas d'erreur, initialiser avec un tableau vide et afficher l'état "Tout" par défaut
      allReviews = [];
      showAllReviews(); // Ceci affichera "Aucun avis pour le moment" avec le bon style
      console.error('Erreur lors du chargement des avis:', err);
    }
  }

  setTimeout(initReviews, 200);
  
  // Afficher l'état initial immédiatement
  document.addEventListener('DOMContentLoaded', function() {
    // Initialiser avec un tableau vide pour éviter l'erreur
    if (typeof allReviews === 'undefined') {
      allReviews = [];
    }
    showAllReviews(); // Affiche l'état vide propre par défaut avec le bouton "Tout" actif
  });

  // Fonction de recherche dans les avis
  function searchReviews() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const filteredReviews = allReviews.filter(review => {
      // Recherche dans le nom du client, le commentaire, et la note
      const clientName = review.nom_client ? review.nom_client.toLowerCase() : '';
      const comment = review.commentaire ? review.commentaire.toLowerCase() : '';
      const rating = review.note ? review.note.toString() : '';
      
      return clientName.includes(searchTerm) || 
             comment.includes(searchTerm) || 
             rating.includes(searchTerm);
    });
    
    // Appliquer aussi le filtre par étoiles
    const finalReviews = searchTerm ? 
      filteredReviews.filter(review => review.note === selectedRating) :
      allReviews.filter(review => review.note === selectedRating);
    
    renderReviews(finalReviews);
  }
  
  // Fonction pour afficher une liste d'avis
  function renderReviews(reviews) {
    reviewsContainer.innerHTML = '';
    if (reviews.length === 0) {
      reviewsContainer.innerHTML = `
        <div class="text-center py-8" style="color: var(--text-gray);">
          <i class="fas fa-star text-2xl mb-2" style="color: rgba(247, 181, 0, 0.3);"></i>
          <p class="text-sm">Aucun avis pour le moment</p>
        </div>
      `;
      return;
    }
    reviews.forEach(renderReview);
  }

  // Menu compte utilisateur - s'assurer que le DOM est chargé
  const btn = document.getElementById("account-dropdown-toggle");
  const dropdown = document.getElementById("account-dropdown");

  console.log('[DEBUG] Bouton account trouvé:', btn);
  console.log('[DEBUG] Dropdown trouvé:', dropdown);

  if (btn && dropdown) {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      console.log('👆 Click sur account button');
      
      if (dropdown.classList.contains("hidden")) {
        dropdown.classList.remove("hidden");
        console.log('[UNLOCK] Dropdown ouvert');
      } else {
        dropdown.classList.add("hidden");
        console.log('[LOCK] Dropdown fermé');
      }
      
      console.log('[BAN] Dropdown classes:', dropdown.className);
    });

    window.addEventListener("click", (e) => {
      if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.add("hidden");
      }
    });
    console.log('[OK] Event listeners ajoutés');
  } else {
    // console.error('[ERROR] Bouton ou dropdown non trouvé');
  }

  // Fonction de déconnexion
  window.logout = function() {
    localStorage.removeItem('username');
    localStorage.removeItem('token');
    window.location.href = '/';
  };
</script>

  <!-- Script pour gestion menu actif -->
  <script>
    // Fonction pour activer le menu basé sur la page actuelle
    function activateCurrentPageMenu() {
      const currentPath = window.location.pathname;
      console.log('🌐 Page actuelle détectée:', currentPath);

      const allMenuLinks = document.querySelectorAll('#sidebar a');
      allMenuLinks.forEach(link => {
        link.classList.remove('menu-active');
        link.removeAttribute('data-menu-state');
      });

      const pageMap = {
        '/dashboard': '/dashboard',
        '/centralevue': '/centralevue',
        '/calcul': '/calcul',
        '/soumissions': '/soumissions',
        '/gqp': '/gqp',
        '/travaux': '/travaux',
        '/facture': '/facture',
        '/avis': '/avis',
        '/centrale': '/centrale',
        '/dashboardcoach': '/dashboardcoach'
      };

      const targetPath = pageMap[currentPath];
      let targetLink = null;

      if (targetPath) {
        targetLink = document.querySelector(`#sidebar a[data-path="${targetPath}"]`);
        console.log('[TARGET] Page détectée - activation du menu pour:', targetPath);
      }

      if (targetLink) {
        targetLink.classList.add('menu-active');
        targetLink.setAttribute('data-menu-state', 'active');
        console.log('[OK] Menu activé pour:', targetLink.textContent.trim());
      } else {
        console.log('[WARN] Aucun menu trouvé pour la page:', currentPath);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      activateCurrentPageMenu();
      setTimeout(activateCurrentPageMenu, 150);
      setTimeout(activateCurrentPageMenu, 300);
    });

    // Fonction pour retourner à la page de gestions
    function goBackToGestions() {
      window.location.href = '/gestionsmobile';
    }
  </script>

    if (isCoach) {
      document.body.classList.add('coach-mode');

      const selector = document.getElementById('coach-entrepreneur-selector');
      const backdrop = document.getElementById('coach-selector-backdrop');

      if (selector) {
        selector.classList.add('visible');
      }

      // Afficher le backdrop en mode centré
      if (backdrop) {
        backdrop.classList.add('visible');
      }

      // Attendre que window.username soit disponible
      if (window.username) {
        loadEntrepreneursForCoach();
      } else {
        setTimeout(() => {
          if (window.username) {
            loadEntrepreneursForCoach();
          }
        }, 100);
      }

      const dropdownToggle = document.getElementById('coach-dropdown-toggle');
      const dropdownMenu = document.getElementById('coach-dropdown-menu');

      if (dropdownToggle && dropdownMenu) {
        dropdownToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          this.classList.toggle('active');
          dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
          if (!dropdownToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
            dropdownToggle.classList.remove('active');
            dropdownMenu.classList.remove('show');
          }
        });
      }
    }

    function selectEntrepreneur(username) {
      const dropdownToggle = document.getElementById('coach-dropdown-toggle');
      const dropdownMenu = document.getElementById('coach-dropdown-menu');
      const selector = document.getElementById('coach-entrepreneur-selector');
      const backdrop = document.getElementById('coach-selector-backdrop');

      if (dropdownToggle) {
        dropdownToggle.innerHTML = `

            <i class="fas fa-user-circle"></i>
            ${username}
          </span>
          <i class="fas fa-chevron-down chevron"></i>

        dropdownToggle.classList.remove('active');
        if (dropdownMenu) {
          dropdownMenu.classList.remove('show');
