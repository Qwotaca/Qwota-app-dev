<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Qwota | Automatisation rapide de documents professionnels</title>
  <meta name="description" content="Créez vos soumissions en 5 minutes, factures automatisées et gestion simplifiée. Gagnez du temps avec Qwota, votre solution tout-en-un pour les documents professionnels." />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#5271ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Qwota">

  <link rel="icon" href="/favicon" type="image/x-icon">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background elements */
    .bg-element {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      animation: float 20s infinite ease-in-out;
    }

    .bg-element:nth-child(1) {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      top: -200px;
      left: -200px;
      animation-delay: 0s;
    }

    .bg-element:nth-child(2) {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      bottom: -150px;
      right: -150px;
      animation-delay: 5s;
    }

    .bg-element:nth-child(3) {
      width: 250px;
      height: 250px;
      background: linear-gradient(135deg, #5271ff, #3b82f6);
      top: 50%;
      left: 10%;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      25% {
        transform: translate(30px, -30px) scale(1.1);
      }
      50% {
        transform: translate(-20px, 20px) scale(0.9);
      }
      75% {
        transform: translate(20px, 30px) scale(1.05);
      }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo container */
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      margin-bottom: 4rem;
      animation: slideDown 1.2s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      animation: float-logo 3s infinite ease-in-out;
    }

    .logo-left {
      width: 300px;
      height: auto;
      filter: drop-shadow(0 10px 30px rgba(59, 130, 246, 0.5));
      animation-delay: 0s;
    }

    .logo-right {
      width: 300px;
      height: auto;
      filter: drop-shadow(0 10px 30px rgba(59, 130, 246, 0.5));
      animation-delay: 1s;
    }

    @keyframes float-logo {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    /* X separator */
    .separator {
      font-size: 6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 50%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse-x 2s infinite ease-in-out;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
    }

    @keyframes pulse-x {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.8;
        transform: scale(1.1);
      }
    }

    /* Button */
    .cta-button {
      position: relative;
      padding: 1.25rem 3rem;
      font-size: 1.25rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
      animation: float-button 3s infinite ease-in-out;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .cta-button:hover::before {
      left: 100%;
    }

    .cta-button:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6);
    }

    .cta-button:active {
      transform: translateY(-2px) scale(1.02);
    }

    @keyframes float-button {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    /* Sparkle effect */
    @keyframes sparkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: sparkle 2s infinite;
    }

    .sparkle:nth-child(1) {
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .sparkle:nth-child(2) {
      top: 40%;
      right: 15%;
      animation-delay: 0.5s;
    }

    .sparkle:nth-child(3) {
      bottom: 30%;
      left: 20%;
      animation-delay: 1s;
    }

    .sparkle:nth-child(4) {
      bottom: 20%;
      right: 10%;
      animation-delay: 1.5s;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .logo-container {
        flex-direction: column;
        gap: 2rem;
      }

      .logo-left,
      .logo-right {
        width: 200px;
      }

      .separator {
        font-size: 4rem;
        transform: rotate(90deg);
        margin: 1rem 0;
      }

      .cta-button {
        font-size: 1rem;
        padding: 1rem 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background animated elements -->
  <div class="bg-element"></div>
  <div class="bg-element"></div>
  <div class="bg-element"></div>

  <!-- Sparkles -->
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

  <!-- Main container -->
  <div class="container">
    <!-- Logo section -->
    <div class="logo-container">
      <img src="https://i.ibb.co/fzFfjJtL/7.png" alt="Qwota Logo" class="logo logo-left">
      <div class="separator">×</div>
      <img src="https://i.ibb.co/xK7Rtkz4/6.png" alt="Partner Logo" class="logo logo-right">
    </div>

    <!-- CTA Button -->
    <a href="/login" class="cta-button">
      Accéder à la plateforme
    </a>
  </div>

  <script>
    // Add extra sparkle animation on mouse move
    document.addEventListener('mousemove', (e) => {
      if (Math.random() > 0.95) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = e.clientX + 'px';
        sparkle.style.top = e.clientY + 'px';
        sparkle.style.position = 'fixed';
        document.body.appendChild(sparkle);

        setTimeout(() => {
          sparkle.remove();
        }, 2000);
      }
    });
  </script>
</body>
</html>
